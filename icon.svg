<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- rounded background -->
  <rect width="512" height="512" rx="96" fill="#1a1a2e"/>
  <!-- 2x2 color grid, centered with gaps -->
  <!-- top-left: warm orange -->
  <rect x="60"  y="60"  width="176" height="176" rx="32" fill="#e07030"/>
  <!-- top-right: green -->
  <rect x="276" y="60"  width="176" height="176" rx="32" fill="#38a046"/>
  <!-- bottom-left: blue -->
  <rect x="60"  y="276" width="176" height="176" rx="32" fill="#3060d0"/>
  <!-- bottom-right: pink/purple -->
  <rect x="276" y="276" width="176" height="176" rx="32" fill="#c040b0"/>
</svg>
